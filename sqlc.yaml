version: "2"
sql:
  - engine: "postgresql"
    queries: "query"
    schema: "migrations"
    gen:
      go:
        package: "repository"
        sql_package: "pgx/v5"
        out: "internal/repository"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

